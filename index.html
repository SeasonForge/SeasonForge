<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeasonForge - ARPG Season Tracker</title>
    <meta name="description" content="Monitor current and upcoming seasons, cycles, and leagues of major action RPGs like Path of Exile, Diablo IV, Last Epoch, and Torchlight Infinite." />
    <meta name="google-site-verification" content="1ZmquktDWf9wST9j1OsRN_dFaSGy_9-yIFz_5vbRN0c" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SeasonForge - ARPG Season Tracker" />
    <meta property="og:description" content="Monitor current and upcoming seasons, cycles, and leagues of major action RPGs like Path of Exile, Diablo IV, Last Epoch, and Torchlight Infinite." />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SeasonForge - ARPG Season Tracker" />
    <meta name="twitter:description" content="Monitor current and upcoming seasons, cycles, and leagues of major action RPGs like Path of Exile, Diablo IV, Last Epoch, and Torchlight Infinite." />

    <link rel="stylesheet" href="./src/styles/main.css?v=1.0.1" />
    <link rel="icon" href="./assets/favicon.png" type="image/png" />
    <link rel="canonical" href="https://seasonforge.online/" />
    <link rel="alternate" hreflang="x-default" href="https://seasonforge.online/" />
    <link rel="alternate" hreflang="en" href="https://seasonforge.online/" />
    <link rel="alternate" hreflang="ru" href="https://seasonforge.online/?lang=ru" />
    <meta property="og:image" content="https://seasonforge.online/assets/images/og-image.jpg" />
    <meta name="twitter:image" content="https://seasonforge.online/assets/images/og-image.jpg" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__logo-block">
        <div class="app-header__icon" style="padding: 0; overflow: hidden; background: transparent; border: none;">
          <img src="./assets/favicon.png" alt="SeasonForge Icon" style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;" />
        </div>
        <div>
          <h1 class="app-header__title">SeasonForge</h1>
          <p class="app-header__subtitle" id="app-header-subtitle">Monitoring current and upcoming seasons of major action RPGs</p>
        </div>
      </div>
      <div class="app-header__right-block">
        <div class="app-header__meta">
          <div class="app-header__meta-item">
            <span class="app-header__meta-label" id="lbl-status-check"><span class="status-dot"></span> Parser Active</span>
            <strong id="last-checked-time">-</strong>
          </div>
          <div class="app-header__meta-item">
            <span class="app-header__meta-label" id="lbl-last-updated">Last Changed</span>
            <strong id="last-updated-time">-</strong>
          </div>
        </div>
        <div class="app-header__tools">
          <div id="lang-switcher" class="lang-switcher"></div>
          <button id="feedback-trigger-btn" class="feedback-trigger-btn">
            <span class="feedback-trigger-btn__icon">💬</span>
            <span id="lbl-feedback-btn">Feedback</span>
          </button>
          <button id="streamer-trigger-btn" class="streamer-trigger-btn">
            <span class="streamer-trigger-btn__icon">🎥</span>
            <span id="lbl-streamer-btn">OBS Widgets</span>
          </button>
        </div>
      </div>
    </header>

    <div class="app-layout">
      <aside id="navbar"></aside>
      <main id="content"></main>
    </div>

    <footer class="app-footer">
      <span>© 2026 SeasonForge. Автоматический мониторинг ARPG сезонов.</span>
    </footer>

    <nav class="mobile-nav" id="mobile-nav">
      <button class="mobile-nav__btn mobile-nav__btn--active" id="mob-btn-tracker">
        <span class="mobile-nav__icon">🔥</span>
        <span class="mobile-nav__label" id="mob-lbl-tracker">Tracker</span>
      </button>
      <button class="mobile-nav__btn" id="mob-btn-timeline">
        <span class="mobile-nav__icon">📅</span>
        <span class="mobile-nav__label" id="mob-lbl-timeline">Timeline</span>
      </button>
      <button class="mobile-nav__btn" id="mob-btn-games">
        <span class="mobile-nav__icon">🎮</span>
        <span class="mobile-nav__label" id="mob-lbl-games">Games</span>
      </button>
      <button class="mobile-nav__btn" id="mob-btn-more">
        <span class="mobile-nav__icon">⚙️</span>
        <span class="mobile-nav__label" id="mob-lbl-more">More</span>
      </button>
    </nav>

    <div id="toast-root"></div>
    <div id="modal-root"></div>
    <script type="module" src="./src/app.js?v=1.0.1"></script>
  </body>
</html>
